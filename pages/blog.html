<main>
<section id="posts" class="blog-listing">
  <div class="container">
    <h1>Pool & Spa Blog — Las Vegas</h1>
    <div id="posts-grid" class="posts-grid"></div>
  </div>
</section>
</main>

<script>
(function () {
  var grid = document.getElementById('posts-grid');
  var fmtDate = function (d) {
    if (!d) return '';
    try {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch (e) { return d; }
  };
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"\']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]; }); };
  fetch('/blog/posts.json', { cache: 'no-cache' })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var posts = Array.isArray(data) ? data : ((data && data.posts) || []);
      posts.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
      grid.innerHTML = posts.map(function (p) {
        var url = '/article/' + encodeURIComponent(p.slug || '');
        var img = p.featured_image || p.image || '';
        var thumb = img ? '<div class="thumb"><img src="' + esc(img) + '" alt="' + esc(p.title || '') + '" loading="lazy"></div>' : '';
        var cat = p.category ? '<span class="cat">' + esc(p.category) + '</span>' : '';
        var excerpt = p.excerpt ? '<p class="excerpt">' + esc(p.excerpt) + '</p>' : '';
        return '<a class="post-card" href="' + url + '">' + thumb + '<div class="body">' + cat + '<h3>' + esc(p.title || 'Untitled') + '</h3>' + excerpt + '<div class="meta"><span>' + esc(fmtDate(p.date)) + '</span><span>Read \u2192</span></div></div></a>';
      }).join('');
    })
    .catch(function () { grid.innerHTML = '<p>Could not load posts.</p>'; });
})();
</script>
