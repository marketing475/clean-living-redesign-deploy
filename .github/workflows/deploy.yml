name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diagnose env
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "token starts (first 6): ${CLOUDFLARE_API_TOKEN:0:6}"
          echo "account length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "account starts: ${CLOUDFLARE_ACCOUNT_ID:0:4}"
          echo "account ends:   ${CLOUDFLARE_ACCOUNT_ID: -4}"
          echo "test API call:"
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/clean-living-redesign" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
