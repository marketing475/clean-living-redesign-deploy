name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Length probe
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          A: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # print sha256 (won't match secret, so won't get masked)
          echo "token sha256: $(printf '%s' "$T" | sha256sum | cut -c1-16)"
          echo "account sha256: $(printf '%s' "$A" | sha256sum | cut -c1-16)"
          # print length via a math expr to avoid direct output that might collide
          echo "token bytes / 10: $(( $(printf '%s' "$T" | wc -c) / 10 ))"
          echo "account bytes / 10: $(( $(printf '%s' "$A" | wc -c) / 10 ))"
